<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Detail — VINTAGE</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .detail-page { max-width: 900px; margin: 0 auto; padding: 32px 20px 48px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 20px; }
    .back-link:hover { color: var(--color-primary); }
    .detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; }
    .detail-header h1 { font-family: var(--font-display); font-size: 28px; }
    .detail-header .order-date { font-size: 13px; color: var(--color-text-muted); margin-top: 4px; }
    .detail-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px; }
    .detail-card {
      background: white; border: 1px solid var(--color-border-light);
      border-radius: var(--radius-md); padding: 20px;
    }
    .detail-card h3 { font-family: var(--font-display); font-size: 16px; margin-bottom: 16px; }
    .detail-item {
      display: flex; gap: 14px; padding: 14px 0;
      border-bottom: 1px solid var(--color-border-light);
    }
    .detail-item:last-child { border-bottom: none; }
    .detail-item-img {
      width: 64px; height: 80px; border-radius: var(--radius-sm);
      overflow: hidden; background: #F0EDE8; flex-shrink: 0;
    }
    .detail-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .detail-item-info { flex: 1; }
    .detail-item-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .detail-item-meta { font-size: 12px; color: var(--color-text-muted); }
    .detail-item-price { font-size: 15px; font-weight: 600; margin-left: auto; align-self: center; }
    .info-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; }
    .info-row .label { color: var(--color-text-secondary); }
    .info-row .value { font-weight: 500; }
    .info-row.total { font-size: 16px; font-weight: 600; border-top: 2px solid var(--color-border); padding-top: 12px; margin-top: 8px; }
    .status-timeline { margin-top: 16px; }
    .timeline-step { display: flex; gap: 12px; padding: 8px 0; position: relative; }
    .timeline-dot {
      width: 12px; height: 12px; border-radius: 50%; background: var(--color-border);
      flex-shrink: 0; margin-top: 3px; position: relative;
    }
    .timeline-dot.active { background: var(--color-primary); }
    .timeline-dot.done { background: var(--color-success); }
    .timeline-step:not(:last-child) .timeline-dot::after {
      content: ''; position: absolute; left: 50%; top: 12px;
      width: 2px; height: 24px; background: var(--color-border);
      transform: translateX(-50%);
    }
    .timeline-step:not(:last-child) .timeline-dot.done::after { background: var(--color-success); }
    .timeline-label { font-size: 13px; font-weight: 500; }
    .timeline-label.muted { color: var(--color-text-muted); }
    @media (max-width: 768px) {
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="detail-page">
    <a href="/orders.html" class="back-link">← Back to Orders</a>
    <div id="detail-content">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <footer class="footer">
    <span class="footer-logo">VINTAGE</span>
    <span class="footer-copy">&copy; 2026 VINTAGE THRIFT. ALL RIGHTS RESERVED.</span>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    const orderId = new URLSearchParams(window.location.search).get('id');
    const statusOrder = ['pending', 'processing', 'shipped', 'completed'];
    const statusLabels = { pending: 'Menunggu Pembayaran', processing: 'Diproses', shipped: 'Dikirim', completed: 'Selesai', cancelled: 'Dibatalkan' };

    async function loadDetail() {
      if (!isLoggedIn()) { window.location.href = '/login.html'; return; }
      if (!orderId) { window.location.href = '/orders.html'; return; }
      try {
        const data = await apiFetch(`/api/orders/${orderId}`);
        renderDetail(data);
        document.title = `Order ${data.order.order_id} — VINTAGE`;
      } catch (e) {
        document.getElementById('detail-content').innerHTML = '<div class="empty-state"><h3>Order not found</h3></div>';
      }
    }

    function renderDetail(data) {
      const { order, items } = data;
      const currentIdx = statusOrder.indexOf(order.status);

      document.getElementById('detail-content').innerHTML = `
        <div class="detail-header">
          <div>
            <h1>${order.order_id}</h1>
            <div class="order-date">${formatDate(order.created_at)}</div>
          </div>
          <div style="text-align:right">
            <span class="badge badge-status-${order.status}">${statusLabels[order.status]}</span>
            ${order.status === 'pending' ? `<br><button class="btn btn-danger btn-sm" style="margin-top:8px" onclick="cancelOrder()">Cancel Order</button>` : ''}
          </div>
        </div>
        <div class="detail-grid">
          <div>
            <div class="detail-card">
              <h3>Items Ordered</h3>
              ${items.map(item => `
                <div class="detail-item">
                  <div class="detail-item-img"><img src="${getProductImage({ name: item.snapshot_name })}" alt="${item.snapshot_name}"></div>
                  <div class="detail-item-info">
                    <div class="detail-item-name">${item.snapshot_name}</div>
                    <div class="detail-item-meta">${item.snapshot_category} · ${item.snapshot_size} · ${item.snapshot_condition}</div>
                    <div class="detail-item-meta">Qty: ${item.quantity}</div>
                  </div>
                  <div class="detail-item-price">${formatPrice(item.snapshot_price)}</div>
                </div>
              `).join('')}
            </div>
          </div>
          <div>
            <div class="detail-card" style="margin-bottom:16px">
              <h3>Order Status</h3>
              <div class="status-timeline">
                ${order.status === 'cancelled' ? `
                  <div class="timeline-step"><div class="timeline-dot" style="background:var(--color-danger)"></div><div class="timeline-label" style="color:var(--color-danger)">Dibatalkan</div></div>
                ` : statusOrder.map((s, i) => `
                  <div class="timeline-step">
                    <div class="timeline-dot ${i <= currentIdx ? (i === currentIdx ? 'active' : 'done') : ''}"></div>
                    <div class="timeline-label ${i > currentIdx ? 'muted' : ''}">${statusLabels[s]}</div>
                  </div>
                `).join('')}
              </div>
            </div>
            <div class="detail-card" style="margin-bottom:16px">
              <h3>Shipping</h3>
              <div style="font-size:13px;color:var(--color-text-secondary);line-height:1.7">${order.shipping_address}</div>
            </div>
            <div class="detail-card">
              <h3>Payment</h3>
              <div class="info-row"><span class="label">Method</span><span class="value">${order.payment_method.replace('_', ' ')}</span></div>
              <div class="info-row"><span class="label">Subtotal</span><span class="value">${formatPrice(order.total_price)}</span></div>
              <div class="info-row"><span class="label">Shipping</span><span class="value">Rp ${order.shipping_cost.toLocaleString()}</span></div>
              <div class="info-row total"><span>Total</span><span>${formatPrice(order.total_price + order.shipping_cost)}</span></div>
            </div>
          </div>
        </div>
      `;
    }

    async function cancelOrder() {
      if (!confirm('Apakah Anda yakin ingin membatalkan pesanan ini?')) return;
      try {
        await apiFetch(`/api/orders/${orderId}/cancel`, { method: 'PUT' });
        showToast('Order dibatalkan');
        loadDetail();
      } catch (e) { showToast(e.message, 'error'); }
    }

    loadDetail();
  </script>
</body>
</html>
