<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — VINTAGE</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="auth-page">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your VINTAGE account</p>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block" id="login-btn">Sign In</button>
      </form>
      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Create one</a>
      </div>
      <div style="margin-top:20px;padding:14px;background:var(--color-bg);border-radius:var(--radius-sm);font-size:12px;color:var(--color-text-secondary)">
        <strong>Demo accounts:</strong><br>
        Customer: customer@vintage.com / user123<br>
        Admin: admin@vintage.com / admin123
      </div>
    </div>
  </div>

  <footer class="footer">
    <span class="footer-logo">VINTAGE</span>
    <span class="footer-copy">&copy; 2026 VINTAGE THRIFT. ALL RIGHTS RESERVED.</span>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = '/index.html';

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        const data = await apiFetch('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        setToken(data.token);
        setUser(data.user);
        window.location.href = data.user.role === 'admin' ? '/admin.html' : '/index.html';
      } catch (e) {
        showToast(e.message, 'error');
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
