<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — VINTAGE</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .cart-page { max-width: 900px; margin: 0 auto; padding: 32px 20px 48px; }
    .cart-page h1 { font-family: var(--font-display); font-size: 32px; margin-bottom: 24px; }
    .cart-item {
      display: flex; gap: 16px; padding: 20px;
      background: white; border: 1px solid var(--color-border-light);
      border-radius: var(--radius-md); margin-bottom: 12px;
      transition: box-shadow var(--transition);
    }
    .cart-item:hover { box-shadow: var(--shadow-sm); }
    .cart-item-img {
      width: 100px; height: 120px; border-radius: var(--radius-sm);
      overflow: hidden; background: #F0EDE8; flex-shrink: 0;
    }
    .cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
    .cart-item-meta { font-size: 12px; color: var(--color-text-muted); margin-bottom: 8px; }
    .cart-item-price { font-size: 18px; font-weight: 600; }
    .cart-item-actions { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; }
    .remove-btn {
      background: none; border: none; color: var(--color-danger);
      font-size: 13px; cursor: pointer; padding: 4px 8px;
    }
    .remove-btn:hover { text-decoration: underline; }
    .cart-summary {
      background: white; border: 1px solid var(--color-border-light);
      border-radius: var(--radius-md); padding: 24px; margin-top: 24px;
    }
    .cart-summary-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
    .cart-summary-row.total { font-size: 18px; font-weight: 600; border-top: 2px solid var(--color-border); padding-top: 16px; margin-top: 8px; }
    .qty-label { font-size: 12px; color: var(--color-text-muted); background: var(--color-border-light); padding: 2px 8px; border-radius: var(--radius-full); }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="cart-page">
    <h1>Shopping Cart</h1>
    <div id="cart-content">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <footer class="footer">
    <span class="footer-logo">VINTAGE</span>
    <span class="footer-copy">&copy; 2026 VINTAGE THRIFT. ALL RIGHTS RESERVED.</span>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    async function loadCart() {
      if (!isLoggedIn()) { window.location.href = '/login.html'; return; }
      try {
        const data = await apiFetch('/api/cart');
        renderCart(data);
      } catch (e) {
        document.getElementById('cart-content').innerHTML = '<p>Error loading cart</p>';
      }
    }

    function renderCart(data) {
      const container = document.getElementById('cart-content');
      if (!data.items.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🛒</div>
            <h3>Your cart is empty</h3>
            <p>Start exploring our curated collection and add some treasures to your cart.</p>
            <a href="/archive.html" class="btn btn-primary" style="margin-top:16px">Browse Archive</a>
          </div>`;
        return;
      }

      const shipping = 15000;
      container.innerHTML = `
        ${data.items.map(item => `
          <div class="cart-item">
            <div class="cart-item-img">
              <a href="/product.html?id=${item.product_id}"><img src="${getProductImage(item)}" alt="${item.name}"></a>
            </div>
            <div class="cart-item-info">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-meta">${item.category} · Size: ${item.size} · ${item.condition}</div>
              <span class="qty-label">Qty: ${item.quantity}</span>
            </div>
            <div class="cart-item-actions">
              <button class="remove-btn" onclick="removeItem(${item.id})">✕ Remove</button>
              <div class="cart-item-price">${formatPrice(item.price)}</div>
            </div>
          </div>
        `).join('')}
        <div class="cart-summary">
          <div class="cart-summary-row"><span>Subtotal (${data.count} items)</span><span>${formatPrice(data.total)}</span></div>
          <div class="cart-summary-row"><span>Shipping</span><span>Rp ${shipping.toLocaleString()}</span></div>
          <div class="cart-summary-row total"><span>Total</span><span>${formatPrice(data.total)} + Rp ${shipping.toLocaleString()}</span></div>
          <a href="/checkout.html" class="btn btn-primary btn-lg btn-block" style="margin-top:20px">Proceed to Checkout</a>
        </div>
      `;
    }

    async function removeItem(cartItemId) {
      try {
        await apiFetch(`/api/cart/remove/${cartItemId}`, { method: 'DELETE' });
        showToast('Item dihapus dari keranjang');
        loadCart();
        updateCartBadge();
      } catch (e) { showToast(e.message, 'error'); }
    }

    loadCart();
  </script>
</body>
</html>
