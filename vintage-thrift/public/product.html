<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — VINTAGE</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 24px; padding: 20px 0 0; }
    .back-link:hover { color: var(--color-primary); }
    .product-layout { display: flex; gap: 48px; padding: 0 40px 48px; }
    .product-gallery { flex: 1; display: flex; gap: 12px; }
    .gallery-thumbs { display: flex; flex-direction: column; gap: 8px; width: 80px; }
    .gallery-thumb {
      width: 80px; height: 90px; border-radius: var(--radius-sm);
      overflow: hidden; cursor: pointer; border: 2px solid transparent;
      transition: border-color var(--transition); background: #F0EDE8;
    }
    .gallery-thumb.active { border-color: var(--color-primary); }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-main {
      flex: 1; aspect-ratio: 3/4; max-height: 600px;
      border-radius: var(--radius-md); overflow: hidden; background: #F0EDE8;
    }
    .gallery-main img { width: 100%; height: 100%; object-fit: cover; }
    .product-info { flex: 1; max-width: 500px; }
    .breadcrumb { font-size: 12px; color: var(--color-text-muted); margin-bottom: 12px; }
    .breadcrumb a:hover { color: var(--color-primary); }
    .product-info h1 { font-family: var(--font-display); font-size: 28px; font-weight: 600; margin-bottom: 8px; }
    .product-price { font-size: 22px; font-weight: 600; margin-bottom: 16px; }
    .product-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .product-desc { font-size: 14px; line-height: 1.8; color: var(--color-text-secondary); margin-bottom: 24px; }
    .product-specs { list-style: none; margin-bottom: 28px; }
    .product-specs li {
      font-size: 13px; color: var(--color-text-secondary);
      padding: 6px 0 6px 20px; position: relative;
    }
    .product-specs li::before { content: '•'; position: absolute; left: 4px; color: var(--color-primary); }
    .add-to-cart-btn {
      width: 100%; padding: 16px; background: var(--color-primary); color: white;
      border: none; border-radius: var(--radius-sm); font-size: 14px;
      font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      cursor: pointer; transition: all 0.3s ease;
    }
    .add-to-cart-btn:hover { background: #3D2A5E; transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .related-section { padding: 32px 40px 48px; }
    .related-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .related-card { cursor: pointer; transition: transform 0.3s; }
    .related-card:hover { transform: translateY(-4px); }
    .related-card-img {
      aspect-ratio: 3/4; border-radius: var(--radius-md); overflow: hidden;
      background: #F0EDE8; margin-bottom: 10px;
    }
    .related-card-img img { width: 100%; height: 100%; object-fit: cover; }
    .related-card .name { font-size: 14px; font-weight: 500; }
    .related-card .price { font-size: 14px; color: var(--color-text-secondary); }
    @media (max-width: 768px) {
      .product-layout { flex-direction: column; padding: 0 16px 32px; gap: 24px; }
      .product-gallery { flex-direction: column-reverse; }
      .gallery-thumbs { flex-direction: row; width: 100%; }
      .gallery-thumb { width: 60px; height: 70px; }
      .product-info { max-width: 100%; }
      .related-grid { grid-template-columns: repeat(2, 1fr); }
      .related-section { padding: 24px 16px 32px; }
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div style="padding: 0 40px;">
    <a href="/archive.html" class="back-link">← Back to Catalog</a>
  </div>

  <div class="product-layout" id="product-detail">
    <div class="loading" style="grid-column:1/-1"><div class="spinner"></div></div>
  </div>

  <section class="related-section" id="related-section" style="display:none">
    <div class="section-header">
      <h2 class="section-title" style="color: var(--color-primary)">You Might Also Like</h2>
    </div>
    <div class="related-grid" id="related-grid"></div>
  </section>

  <footer class="footer">
    <span class="footer-logo">VINTAGE</span>
    <span class="footer-copy">&copy; 2026 VINTAGE THRIFT. ALL RIGHTS RESERVED.</span>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    const productId = new URLSearchParams(window.location.search).get('id');

    async function loadProduct() {
      if (!productId) { window.location.href = '/archive.html'; return; }
      try {
        const data = await apiFetch(`/api/products/${productId}`);
        renderProduct(data.product);
        if (data.related.length) renderRelated(data.related);
        document.title = `${data.product.name} — VINTAGE`;
      } catch (e) {
        document.getElementById('product-detail').innerHTML = '<div class="empty-state"><h3>Product not found</h3><p>This item may have been sold or removed.</p></div>';
      }
    }

    function renderProduct(p) {
      const img = getProductImage(p);
      const descParts = p.description ? p.description.split('. ') : [];
      const mainDesc = descParts.slice(0, 2).join('. ') + '.';
      const specs = descParts.slice(2);

      document.getElementById('product-detail').innerHTML = `
        <div class="product-gallery">
          <div class="gallery-thumbs">
            <div class="gallery-thumb active"><img src="${img}" alt="${p.name}"></div>
            <div class="gallery-thumb"><img src="${img}" alt="${p.name}"></div>
            <div class="gallery-thumb"><img src="${img}" alt="${p.name}"></div>
          </div>
          <div class="gallery-main"><img src="${img}" alt="${p.name}" id="main-image"></div>
        </div>
        <div class="product-info">
          <div class="breadcrumb">Archive › ${p.category}</div>
          <h1>${p.name}</h1>
          <div class="product-price">${formatPrice(p.price)}</div>
          <div class="product-badges">
            <span class="badge badge-unique">Unique: 1 Unit Only</span>
            <span class="badge badge-condition">Condition: ${p.condition}</span>
            <span class="badge badge-condition">Size: ${p.size}</span>
          </div>
          <div class="product-desc">${mainDesc}</div>
          ${specs.length ? `<ul class="product-specs">${specs.map(s => `<li>${s.trim()}</li>`).join('')}</ul>` : ''}
          <button class="add-to-cart-btn" onclick="addToCart(${p.id})">🛒 ADD TO CART</button>
        </div>
      `;

      document.querySelectorAll('.gallery-thumb').forEach(thumb => {
        thumb.addEventListener('click', () => {
          document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
          thumb.classList.add('active');
        });
      });
    }

    function renderRelated(products) {
      document.getElementById('related-section').style.display = 'block';
      document.getElementById('related-grid').innerHTML = products.map(p => `
        <div class="related-card" onclick="location.href='/product.html?id=${p.id}'">
          <div class="related-card-img"><img src="${getProductImage(p)}" alt="${p.name}" loading="lazy"></div>
          <div class="name">${p.name}</div>
          <div class="price">${formatPrice(p.price)}</div>
        </div>
      `).join('');
    }

    async function addToCart(pid) {
      if (!isLoggedIn()) { window.location.href = '/login.html'; return; }
      try {
        await apiFetch('/api/cart/add', { method: 'POST', body: JSON.stringify({ product_id: pid }) });
        showToast('Item ditambahkan ke keranjang');
        updateCartBadge();
      } catch (e) { showToast(e.message, 'error'); }
    }

    loadProduct();
  </script>
</body>
</html>
