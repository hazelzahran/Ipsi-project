<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — VINTAGE</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .orders-page { max-width: 900px; margin: 0 auto; padding: 32px 20px 48px; }
    .orders-page h1 { font-family: var(--font-display); font-size: 32px; margin-bottom: 8px; }
    .orders-sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 28px; }
    .order-card {
      background: white; border: 1px solid var(--color-border-light);
      border-radius: var(--radius-md); padding: 20px; margin-bottom: 12px;
      cursor: pointer; transition: all var(--transition);
    }
    .order-card:hover { box-shadow: var(--shadow-md); border-color: var(--color-primary-light); }
    .order-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .order-id { font-size: 15px; font-weight: 600; font-family: monospace; letter-spacing: 0.5px; }
    .order-date { font-size: 12px; color: var(--color-text-muted); }
    .order-card-body { display: flex; justify-content: space-between; align-items: flex-end; }
    .order-info { font-size: 13px; color: var(--color-text-secondary); }
    .order-total { font-size: 18px; font-weight: 600; }
    .order-meta-row { display: flex; gap: 16px; margin-top: 4px; }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="orders-page">
    <h1>Order History</h1>
    <div class="orders-sub">Track and manage your orders</div>
    <div id="orders-content">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <footer class="footer">
    <span class="footer-logo">VINTAGE</span>
    <span class="footer-copy">&copy; 2026 VINTAGE THRIFT. ALL RIGHTS RESERVED.</span>
  </footer>

  <script src="/js/app.js"></script>
  <script>
    async function loadOrders() {
      if (!isLoggedIn()) { window.location.href = '/login.html'; return; }
      try {
        const orders = await apiFetch('/api/orders');
        renderOrders(orders);
      } catch (e) {
        document.getElementById('orders-content').innerHTML = '<p>Error loading orders</p>';
      }
    }

    function renderOrders(orders) {
      const container = document.getElementById('orders-content');
      if (!orders.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📦</div>
            <h3>No orders yet</h3>
            <p>You haven't placed any orders. Start exploring our curated collection!</p>
            <a href="/archive.html" class="btn btn-primary" style="margin-top:16px">Browse Archive</a>
          </div>`;
        return;
      }

      container.innerHTML = orders.map(o => `
        <div class="order-card" onclick="location.href='/order-detail.html?id=${o.order_id}'">
          <div class="order-card-header">
            <div>
              <div class="order-id">${o.order_id}</div>
              <div class="order-date">${formatDate(o.created_at)}</div>
            </div>
            <span class="badge badge-status-${o.status}">${o.status.charAt(0).toUpperCase() + o.status.slice(1)}</span>
          </div>
          <div class="order-card-body">
            <div class="order-info">
              <div>${o.item_count} item(s)</div>
              <div class="order-meta-row">
                <span>💳 ${o.payment_method.replace('_', ' ')}</span>
              </div>
            </div>
            <div class="order-total">${formatPrice(o.total_price)}</div>
          </div>
        </div>
      `).join('');
    }

    loadOrders();
  </script>
</body>
</html>
